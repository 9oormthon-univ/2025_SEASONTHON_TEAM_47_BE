spring:
  application:
    name: goEuro
  config:
    import: optional:file:.env[.properties]

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb   # 메모리 DB (앱 껐다 켜면 초기화)
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update   # 엔티티에 맞춰 테이블 생성/수정
    properties:
      hibernate:
        format_sql: true
    show-sql: true

