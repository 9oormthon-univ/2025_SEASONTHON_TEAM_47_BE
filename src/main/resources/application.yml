spring:
  main:
    web-application-type: servlet
  application:
    name: goEuro
  config:
    import: optional:file:.env[.properties]
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/testdb;DB_CLOSE_ON_EXIT=FALSE   # 파일기반으로 데이터 남겨둠
    username: sa
    password:

  mvc:  #런타임 시간 조절
    async:
      request-timeout: 600s

  jpa:
    hibernate:
      ddl-auto: update   # 엔티티에 맞춰 테이블 생성/수정
    properties:
      hibernate:
        format_sql: true
    show-sql: true

ai:
  gemini:
    apiKey: ${GEMINI_API_KEY}
    model: ${GEMINI_MODEL}
    baseUrl: ${GEMINI_BASE_URL}

# Swagger UI 접근 경로 설정
springdoc:
  swagger-ui:
    path: /swagger-ui                    # Swagger UI: http://localhost:8080/swagger-ui
  api-docs:
    path: /v3/api-docs                   # OpenAPI 문서 JSON: /v3/api-docs


# CORS 허용(개발용: 프론트 로컬 호스트)
app:
  cors:
    origins: "http://localhost:8080, http://localhost:5173,http://localhost:3000"     # 필요 시 ,로 여러 도메인 추가

kakao:
  client: ${KAKAO_KEY}
  redirect-uri: ${KAKAO_REDIRECT_URL}

